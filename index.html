<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta
    name="description"
    content="Live wireframe of the COSMOS dual-axis solar tracker"
  >
  <title>COSMOS — Tracker Wireframe</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="site-header">
    <h1>COSMOS Tracker</h1>
    <div class="connection-controls">
      <span class="connection">
        <i aria-hidden="true"></i>
        <span id="connectionStatus" aria-live="polite">Connecting</span>
      </span>
      <button id="liveToggle" type="button">Pause</button>
    </div>
  </header>

  <main class="workspace">
    <section class="views" aria-label="Tracker wireframe views">
      <figure class="view view-primary" id="perspectiveStage">
        <canvas
          id="perspectiveCanvas"
          role="img"
          aria-label="Perspective wireframe and predicted path of the COSMOS solar tracker"
        ></canvas>
        <figcaption>Perspective</figcaption>
      </figure>

      <figure class="view" id="topStage">
        <canvas
          id="topCanvas"
          role="img"
          aria-label="Top wireframe and predicted path of the COSMOS solar tracker"
        ></canvas>
        <figcaption>Top</figcaption>
      </figure>

      <figure class="view" id="sideStage">
        <canvas
          id="sideCanvas"
          role="img"
          aria-label="Side wireframe and predicted path of the COSMOS solar tracker"
        ></canvas>
        <figcaption>Side</figcaption>
      </figure>
    </section>

    <aside class="data-panel" aria-label="Tracker data">
      <dl>
        <div><dt>Pan</dt><dd id="panValue">90.0°</dd></div>
        <div><dt>Tilt</dt><dd id="tiltValue">60.0°</dd></div>
        <div><dt>Sun azimuth</dt><dd id="sunAzimuth">145.0°</dd></div>
        <div><dt>Sun elevation</dt><dd id="sunElevation">35.0°</dd></div>
        <div><dt>Light average</dt><dd id="lightAverage">1,948</dd></div>
        <div><dt>Estimated voltage</dt><dd id="estimatedVoltage">1.57 V</dd></div>
        <div><dt>Predicted pan</dt><dd id="predictedPan">108.0°</dd></div>
        <div><dt>Predicted tilt</dt><dd id="predictedTilt">52.0°</dd></div>
      </dl>
    </aside>
  </main>

  <section class="timeline-player" aria-label="Movement history player">
    <button
      class="player-toggle"
      id="playbackToggle"
      type="button"
      aria-label="Play movement history"
    >▶</button>
    <input
      class="timeline-slider"
      id="timelineSlider"
      type="range"
      min="0"
      max="0"
      value="0"
      step="1"
      aria-label="Movement history position"
      disabled
    >
    <span class="timeline-time" id="timelineTime">0:00 / 0:00</span>
    <button
      class="live-jump"
      id="timelineLive"
      type="button"
      data-live="true"
    >Live</button>
  </section>

  <script type="module" src="/app.js"></script>
</body>
</html>
